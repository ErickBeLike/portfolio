<header
  class="fixed top-0 z-50 w-full px-4 sm:px-8 md:px-20 lg:px-32 xl:px-48 2xl:px-80 transition-all duration-300"
  [class.header--initial]="!isScrolled"
>
  <nav
    *transloco="let t"
    class="relative container mx-auto flex items-center justify-between h-20"
    [class.pixel-notch]="isScrolled"
    [class.max-w-7xl]="!isScrolled"
  >
    <a href="#" class="pixel-logo group">
      <i class="ph-fill ph-alien text-2xl"></i>
      <span>ErickBeLike<span class="pixel-logo__dot">.</span></span>
    </a>

    <div class="hidden items-center gap-x-5 md:flex">
      <a href="#stack"      class="nav-link" [class.active]="activeSection === 'stack'"      >{{ t('nav.stack') }}</a>
      <a href="#experience" class="nav-link" [class.active]="activeSection === 'experience'" >{{ t('nav.experience') }}</a>
      <a href="#education"  class="nav-link" [class.active]="activeSection === 'education'"  >{{ t('nav.education') }}</a>
      <a href="#projects"   class="nav-link" [class.active]="activeSection === 'projects'"   >{{ t('nav.projects') }}</a>
      <a href="#about"      class="nav-link" [class.active]="activeSection === 'about'"      >{{ t('nav.about') }}</a>
      <a href="#hero"       class="nav-link">{{ t('nav.contact') }}</a>
    </div>

    <!-- Mobile: language switcher — right side, vertically centered -->
    <div class="pixel-lang-switcher pixel-lang-switcher--mobile">
      <button
        (click)="changeLanguage('en')"
        [class.active]="translocoService.getActiveLang() === 'en'"
        class="lang-btn"
      >EN</button>
      <button
        (click)="changeLanguage('es')"
        [class.active]="translocoService.getActiveLang() === 'es'"
        class="lang-btn"
      >ES</button>
    </div>
  </nav>
</header>

<!-- Language switcher — desktop only (fixed) -->
<div class="pixel-lang-switcher pixel-lang-switcher--desktop fixed top-4 right-6 z-[60]">
  <button
    (click)="changeLanguage('en')"
    [class.active]="translocoService.getActiveLang() === 'en'"
    class="lang-btn"
  >EN</button>
  <button
    (click)="changeLanguage('es')"
    [class.active]="translocoService.getActiveLang() === 'es'"
    class="lang-btn"
  >ES</button>
</div>
