<section
  *transloco="let t"
  id="about"
  class="pixel-section-alt py-24 sm:py-32 px-4 sm:px-8 md:px-20 lg:px-32 xl:px-48 2xl:px-80"
>
  <div class="container mx-auto max-w-7xl">
    <div class="text-center">
      <span class="section-prefix">// 05.</span>
      <h2 class="font-pixel text-xl sm:text-2xl leading-loose" style="color: var(--text-base);">
        {{ t('about.title') }}
      </h2>
      <div class="pixel-divider mt-4"></div>
    </div>

    <div class="mt-16 flex flex-col items-center gap-12 md:flex-row-reverse md:gap-16">
      <div class="flex-shrink-0 md:w-2/5 lg:w-1/3">
        <div class="mx-auto max-w-xs" style="border: 4px solid var(--accent-primary); box-shadow: 8px 8px 0 0 var(--accent-primary);">
          <img
            src="assets/profile-pic.png"
            alt="Foto de Erick"
            class="w-full h-auto block"
            style="image-rendering: pixelated;"
          />
        </div>
      </div>

      <div class="text-center md:text-left md:w-3/5 lg:w-2/3">
        <p class="font-retro text-xl leading-relaxed" style="color: var(--text-base); opacity: 0.85;">
          {{ t('about.p1') }}
        </p>
        <p class="mt-4 font-retro text-xl leading-relaxed" style="color: var(--text-base); opacity: 0.85;">
          {{ t('about.p2') }}
        </p>
        <p class="mt-4 font-retro text-xl leading-relaxed" style="color: var(--text-base); opacity: 0.85;">
          {{ t('about.p3') }}
        </p>
      </div>
    </div>

    <div class="mt-24 max-w-3xl mx-auto text-center">
      <i class="ph-fill ph-game-controller levitating-icon text-5xl" style="color: var(--accent-primary);"></i>
      <blockquote class="pixel-card mt-8 p-8">
        <p class="font-retro text-2xl leading-loose" style="color: var(--text-base);">
          {{ t('about.mentality_part1') }}
          <span class="font-bold" style="color: var(--accent-secondary);">{{ t('about.mentality_highlight') }}</span>
          {{ t('about.mentality_part2') }}
        </p>
      </blockquote>
    </div>
  </div>
</section>
