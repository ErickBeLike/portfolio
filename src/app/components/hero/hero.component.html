<section
  *transloco="let t"
  id="hero"
  class="pixel-section py-24 sm:py-32 px-4 sm:px-8 md:px-20 lg:px-32 xl:px-48 2xl:px-80"
>
  <div class="container mx-auto max-w-7xl text-center md:text-left">

    <!-- Profile + Status row -->
    <div class="flex items-center justify-center gap-x-4 md:justify-start">
      <div class="pixel-profile-wrap">
        <img
          src="assets/me/me_1.webp"
          alt="Foto de perfil de Erick"
          class="h-16 w-16 object-cover"
          style="image-rendering: pixelated;"
        />
      </div>
      <span class="pixel-badge-done">
        <span class="blink-dot"></span>
        {{ t('hero.status') }}
      </span>
    </div>

    <!-- Title + Biome selector -->
    <div class="mt-8 flex flex-col items-center gap-6 md:flex-row md:items-center md:justify-start">
      <h1 class="font-pixel text-xl sm:text-2xl leading-loose" style="color: var(--text-base);">
        {{ t('hero.greeting') }}<br>
        <span style="color: var(--accent-primary);">ErickBeLike</span>
      </h1>

      <!-- Biome selector widget -->
      <div class="biome-selector">
        <span class="biome-selector__label">// {{ t('hero.themeLabel') }}</span>
        <div class="biome-selector__buttons">
          <button
            *ngFor="let b of biomes"
            class="biome-btn"
            [class.biome-btn--active]="currentBiome === b.id"
            (click)="changeBiome(b.id)"
            [title]="b.name"
          >
            <img [src]="b.image" [alt]="b.name" class="biome-btn__icon" style="width:80px;height:80px;object-fit:contain;image-rendering:pixelated;" />
            <span class="biome-btn__name">{{ b.name }}</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Bio -->
    <p class="mt-6 font-retro text-xl sm:text-2xl leading-relaxed" style="color: var(--text-base); opacity: 0.85;">
      {{ t('hero.bio_part1') }}
      <span class="font-bold" style="color: var(--accent-primary);">{{ t('hero.bio_highlight') }}</span>
      {{ t('hero.bio_part2') }}
    </p>

    <!-- CTA buttons -->
    <div class="mt-10 flex flex-wrap items-center justify-center gap-4 md:justify-start">
      <a
        href="https://www.linkedin.com/in/erick-elv/"
        target="_blank"
        class="pixel-btn"
        style="border-color: #0A66C2; color: #0A66C2; box-shadow: 4px 4px 0 0 #0A66C2;"
      >
        <i class="ph-fill ph-linkedin-logo text-lg"></i>
        <span>{{ t('hero.linkedin') }}</span>
      </a>
      <a
        href="mailto:ernestitos1512@gmail.com"
        class="pixel-btn"
        style="border-color: #EA4335; color: #EA4335; box-shadow: 4px 4px 0 0 #EA4335;"
      >
        <i class="ph-fill ph-envelope-simple text-lg"></i>
        <span>{{ t('hero.gmail') }}</span>
      </a>
      <a
        href="https://erickbelike.work/"
        target="_blank"
        rel="noopener noreferrer"
        class="pixel-btn"
        style="border-color: #f0f6fc; color: #f0f6fc; box-shadow: 4px 4px 0 0 #f0f6fc;"
      >
        <i class="ph-fill ph-github-logo text-lg"></i>
        <span>GitHub</span>
      </a>
    </div>
  </div>
</section>
